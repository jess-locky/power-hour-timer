<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Hour Timer</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);  
            color: white;  
        }

        .widget-container {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 30px;  
            background: linear-gradient(145deg, #252540, #1c1c30);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);  
            padding: 25px;
            text-align: center;
        }

        .header {
            font-size: 1rem;
            margin-bottom: 5px;
            color: #b8b8d1;
            letter-spacing: 1px;
        }

        /* Pink timer display */
        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            color: #f472b6;
            margin: 10px 0;
            font-family: 'Segoe UI', monospace;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.5);
        }

        /* Status indicator */
        .status {
            font-size: 0.8rem;
            color: #a78bfa;
            margin-bottom: 20px;
            height: 18px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(167, 139, 250, 0.1);
        }

        .status.running {
            color: #c4b5fd;
            background: rgba(196, 181, 253, 0.15);
        }

        .status.paused {
            color: #f9a8d4;
            background: rgba(249, 168, 212, 0.15);
        }

        .status.finished {
            color: #f472b6;
            background: rgba(244, 114, 182, 0.15);
        }

        /* Button container */
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        /* Base button style */
        .btn {
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Pause/Resume button */
        .btn-pause {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-pause:hover {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-pause.paused {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
        }

        .btn-pause.paused:hover {
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
        }

        /* Reset button */
        .btn-reset {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f472b6, #db2777);
            font-size: 1.3rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.4);
        }

        .btn-reset:hover {
            background: linear-gradient(135deg, #f9a8d4, #ec4899);
            box-shadow: 0 6px 20px rgba(219, 39, 119, 0.5);
        }

        /* Snooze button */
        .btn-snooze {
            background: linear-gradient(135deg, #6d28d9, #4c1d95);
            padding: 12px 16px;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.3);
        }

        .btn-snooze:hover {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            box-shadow: 0 6px 20px rgba(109, 40, 217, 0.4);
        }

        /* Why not add some razzle dazzle. */
        .stars {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="stars">✨⭐✨</div>
        <div class="header">POWER HOUR</div>
        <div class="timer-display" id="timer">60:00</div>
        <div class="status" id="status">▶ Running</div>
        <div class="button-container">
            <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
            <button class="btn btn-reset" onclick="resetTimer()">↻</button>
            <button class="btn btn-snooze" onclick="snoozeTimer()">+5</button>
        </div>
    </div>

    <script>
        // Timer configuration
        const HOUR_IN_SECONDS = 3600;
        const SNOOZE_TIME = 300;

        // Timer state
        let remainingTime = parseInt(localStorage.getItem('powerHourTime')) || HOUR_IN_SECONDS;
        let isPaused = localStorage.getItem('powerHourPaused') === 'true';
        let countdownInterval = null;

        // DOM elements
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const pauseBtn = document.getElementById('pauseBtn');

        // Format time as MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Update the display
        function updateDisplay() {
            timerDisplay.textContent = formatTime(remainingTime);
            
            if (remainingTime <= 0) {
                statusDisplay.textContent = '🎉 Done!';
                statusDisplay.className = 'status finished';
            } else if (isPaused) {
                statusDisplay.textContent = '⏸ Paused';
                statusDisplay.className = 'status paused';
                pauseBtn.textContent = '▶ Play';
                pauseBtn.classList.add('paused');
            } else {
                statusDisplay.textContent = '▶ Running';
                statusDisplay.className = 'status running';
                pauseBtn.textContent = '⏸ Pause';
                pauseBtn.classList.remove('paused');
            }
        }

        // Start the countdown
        function startCountdown() {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (!isPaused && remainingTime > 0) {
                    remainingTime--;
                    localStorage.setItem('powerHourTime', remainingTime);
                    updateDisplay();
                }
                if (remainingTime <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);
        }

        // Toggle pause/resume
        function togglePause() {
            isPaused = !isPaused;
            localStorage.setItem('powerHourPaused', isPaused);
            updateDisplay();
            if (!isPaused && remainingTime > 0) {
                startCountdown();
            }
        }

        // Reset timer
        function resetTimer() {
            remainingTime = HOUR_IN_SECONDS;
            isPaused = false;
            localStorage.setItem('powerHourTime', remainingTime);
            localStorage.setItem('powerHourPaused', false);
            updateDisplay();
            startCountdown();
        }

        // Add snooze feature
        function snoozeTimer() {
            remainingTime += SNOOZE_TIME;
            localStorage.setItem('powerHourTime', remainingTime);
            updateDisplay();
            if (!isPaused) {
                startCountdown();
            }
        }

        // Initialize
        updateDisplay();
        if (!isPaused && remainingTime > 0) {
            startCountdown();
        }
    </script>
</body>
</html>
